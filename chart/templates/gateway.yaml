---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: translator-gateway
  labels:
    app: translator-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: translator-gateway
  template:
    metadata:
      labels:
        app: translator-gateway
    spec:
      containers:
      - name: gateway
        image: quay.io/sara_banderby/translator:backend-gateway
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          protocol: TCP
        env:
        - name: WHISPER_URL
          value: {{ .Values.whisper.url | quote }}
        - name: M2M100_URL
          value: "http://m2m100-service.universal-translator.svc.cluster.local:8000"
        resources:
          requests:
            memory: 256Mi
            cpu: 200m
          limits:
            memory: 512Mi
            cpu: 500m
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: translator-gateway
  labels:
    app: translator-gateway
spec:
  type: ClusterIP
  selector:
    app: translator-gateway
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    protocol: TCP
