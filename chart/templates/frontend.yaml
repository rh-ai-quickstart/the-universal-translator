---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: universal-translator-frontend
  labels:
    app: universal-translator-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: universal-translator-frontend
  template:
    metadata:
      labels:
        app: universal-translator-frontend
    spec:
      containers:
      - name: frontend
        image: quay.io/sara_banderby/translator:frontend
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          protocol: TCP
        resources:
          requests:
            memory: 128Mi
            cpu: 100m
          limits:
            memory: 256Mi
            cpu: 200m
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: universal-translator-frontend
  labels:
    app: universal-translator-frontend
spec:
  type: ClusterIP
  selector:
    app: universal-translator-frontend
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: universal-translator
  labels:
    app: universal-translator-frontend
spec:
  to:
    kind: Service
    name: universal-translator-frontend
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
